name: Build and Deploy Course Materials
on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/*'
      - 'lectures/**'
      - 'assessments/**'
      - 'workshops/**'
      - 'resources/**'
      - 'css/**'
      - 'Makefile'
      - '_config.toml'
      - 'references.bib'
      - 'apa.csl'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    container:
      image: pandoc/latex:3.9
      options: --user root

    steps:
      - name: Install Alpine Dependencies
        run: apk add --no-cache bash git python3 py3-pip py3-yaml make

      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Mark workspace as git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: ./build
          key: build-v1-${{ hashFiles('Makefile', '_config.toml', 'references.bib', 'apa.csl') }}-${{ github.sha }}
          restore-keys: |
            build-v1-${{ hashFiles('Makefile', '_config.toml', 'references.bib', 'apa.csl') }}-

      - name: Restore file modification times (requires git and python3)
        uses: chetan/git-restore-mtime-action@v2

      - name: Install Latex Dependencies
        run: |
          # The pandoc/latex image ships a frozen TeX Live release. Once CTAN's
          # live tlnet repository rolls over to a newer TeX Live year, tlmgr
          # refuses to install against it ("tlmgr itself needs to be updated").
          # Pin tlmgr to this image's own frozen historic archive so installs
          # keep working across the annual rollover.
          TL_YEAR=$(tlmgr --version | sed -n 's/.*version \([0-9]\{4\}\).*/\1/p' | head -1)
          if [ -z "$TL_YEAR" ]; then echo "Could not determine TeX Live year"; exit 1; fi
          tlmgr option repository "https://ftp.math.utah.edu/pub/tex/historic/systems/texlive/${TL_YEAR}/tlnet-final"
          tlmgr install libertine \
                  sourcecodepro \
                  ly1 \
                  sectsty \
                  lastpage \
                  hanging \
                  beamer \
                  beamertheme-metropolis \
                  pgfopts \
                  beamercolorthemeowl \
                  noto \
                  noto-emoji

      - name: Install Dart Sass
        run: |
          wget -O dart-sass.tar.gz https://github.com/sass/dart-sass/releases/download/1.89.2/dart-sass-1.89.2-linux-x64-musl.tar.gz
          tar -xzf dart-sass.tar.gz -C /usr/local/
          echo "/usr/local/dart-sass" >> $GITHUB_PATH
          rm dart-sass.tar.gz
          /usr/local/dart-sass/sass --version

      - name: Build public documents for website
        run: |
          make public

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
